name: env demo
on: workflow_dispatch
env:
  APP_ENV: "dev"
jobs:
  envdemo1:
    runs-on: ubuntu-latest
    steps:
      - name: Connecting to workflow env 
        run: echo "App is connecting to $APP_ENV"
  envdemo:
    runs-on: ubuntu-latest
    env:
      APP_ENV: "test"
    steps:
      - name: Connecting to job env
        run: echo "App is connecting to $APP_ENV"
      - name: env within steps
        env:
          APP_ENV: "prod"
        run: echo "App is connecting to $APP_ENV"
