name: env demo
on: workflow_dispatch
env:
  APP_ENV: "dev"
jobs:
  envdemo:
    runs-on: ubuntu-latest
    steps:
      - name: Connecting to env
        run: echo "App is connecting to $APP_ENV"
      - name: env within steps
        env:
          APP_ENV: "prod"
        run: echo "App is connecting to $APP_ENV"
