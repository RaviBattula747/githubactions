name: outputs demo
on: push
jobs:
  build:
    outputs:
      raviout: ${{ steps.step1.outputs.ravi }}
    runs-on: ubuntu-latest
    steps:
      - name: step one
        id: step1
        run: echo "ravi=Hero" >> $GITHUB_OUTPUT
      - name: step 2
        run: |
          echo "this is the output form the step one: ${{ steps.step1.outputs.ravi }}"
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy the App
        run: echo "deploy the app with the previous job output version ${{ needs.build.outputs.raviout }}"
    
