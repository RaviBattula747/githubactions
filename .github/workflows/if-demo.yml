name: if-demo
on: 
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Run if branch is main
        if: github.ref_name == 'main' # github.ref == 'refs/heads/main'
        run: echo "Running this for main step"
      - name: Run without condition
        run: echo "Running this for main step"
      - name: run for RaviBattula747 or chandra747
        if: github.actor == 'ravibattula747' || github.actor == 'chandra747'
        run: echo "It is triggered by either ravibattula747 or chandra747"
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    steps:
      - name: deciding the execution based on the type
        run: echo "building the application"
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_name == 'main'
    steps:
      - name: deploy step
        run: echo "deploying the application"
        
